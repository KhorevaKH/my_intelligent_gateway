<!DOCTYPE html>
<html>
<head>
    <title>Контроль сроков</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h2>Контроль сроков</h2>
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Тип</th>
                    <th>Контрольная дата</th>
                    <th>Статус</th>
                    <th>Действие</th>
                </tr>
            </thead>
            <tbody>
                {% for doc in documents %}
                <tr class="{% if doc.control_date < now %}table-danger{% elif doc.control_date < now + timedelta(days=3) %}table-warning{% else %}table-success{% endif %}">
                    <td>{{ doc.id }}</td>
                    <td>{{ doc.doc_type_ru }}</td>
                    <td>{{ doc.control_date.strftime('%Y-%m-%d') if doc.control_date else '' }}</td>
                    <td>{{ doc.status_ru }}</td>
                    <td><a href="/doc/{{ doc.id }}" class="btn btn-sm btn-info">Открыть</a></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <a href="/" class="btn btn-primary">На дашборд</a>
    </div>
</body>
</html>
